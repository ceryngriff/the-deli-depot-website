<!DOCTYPE html>
<html lang="en-GB">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#1a1a1a" />
  <title>Production | Admin | The Deli Depot</title>
  <meta name="robots" content="noindex, nofollow" />

  <link rel="icon" type="image/svg+xml" href="../assets/images/favicon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="../css/style.css" />
  <link rel="stylesheet" href="../css/account.css" />
  <link rel="stylesheet" href="../css/admin.css" />
  <link rel="stylesheet" href="../css/admin-production.css" />

  <script src="../js/env.js"></script>
</head>
<body class="admin">

  <div class="admin-shell">

    <!-- SIDEBAR -->
    <aside class="admin-sidebar" aria-label="Admin navigation">
      <a href="/admin/index.html" class="admin-sidebar__brand">
        <span class="brand brand--small">
          <span class="brand__deli">DELI</span>
          <span class="brand__depot">Depot</span>
        </span>
        <span class="admin-sidebar__label">Admin</span>
      </a>
      <nav class="admin-nav" aria-label="Sections">
        <a href="/admin/index.html">Dashboard</a>
        <a href="/admin/menu.html">Menu</a>
        <a href="/admin/orders.html">
          Orders <span class="admin-nav__badge" data-pending-count hidden>0</span>
        </a>
        <a href="/admin/subscriptions.html">Subscriptions</a>
        <a href="/admin/production.html" class="is-active">Production</a>
        <a href="/admin/reports.html">Reports</a>
        <a href="/admin/fridge-temperatures.html">Fridge Temps</a>
        <a href="/admin/opening-closing-checks.html">Opening &amp; Closing Checks</a>
      </nav>
      <div class="admin-sidebar__bottom">
        <nav class="admin-nav" aria-label="Account">
          <a href="/index.html">Back to Site</a>
          <a href="#" data-sign-out>Sign Out</a>
        </nav>
      </div>
    </aside>

    <!-- MAIN -->
    <div class="admin-main">

      <header class="admin-topbar">
        <button class="admin-topbar__toggle" data-sidebar-toggle aria-label="Open menu">☰</button>
        <h1 class="admin-topbar__title">Production</h1>
        <span class="admin-topbar__greeting">Hi, <span data-admin-greeting>Admin</span></span>
      </header>

      <main class="admin-content admin-content--flush">

        <div class="prod-app">

          <!-- Progress -->
          <div class="prod-progress">
            <div class="prod-progress__bar"><div class="prod-progress__fill" id="prodProgFill"></div></div>
            <div class="prod-progress__lbl">
              <span id="prodProgLabel"></span><span id="prodProgPct"></span>
            </div>
          </div>

          <!-- Production line tabs -->
          <div class="prod-toptabs" id="prodTopTabs" role="tablist" aria-label="Production line"></div>

          <!-- View tabs -->
          <div class="prod-subtabs" id="prodSubTabs" role="tablist" aria-label="View"></div>

          <!-- Shopping-list filters -->
          <div class="prod-filters" id="prodFilters" hidden></div>

          <!-- Content -->
          <div id="prodContent"></div>

        </div>

      </main>

      <!-- Sticky bottom action bar -->
      <div class="prod-bottombar">
        <button class="prod-reset" data-action="reset">Reset</button>
        <div class="prod-donecount">
          <span id="prodDoneNum">0</span> / <span id="prodTotalNum">0</span> <span id="prodDoneSuffix">done</span>
        </div>
      </div>

    </div>
  </div>

  <script type="module" src="../js/admin-production.js"></script>
</body>
</html>
