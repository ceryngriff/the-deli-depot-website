[build]
  publish   = "."
  functions = "netlify/functions"

  [[plugins]]
    package = "@netlify/plugin-functions-install-core"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=(self)"
    # Force HTTPS for a year (Netlify serves the site over HTTPS).
    Strict-Transport-Security = "max-age=31536000; includeSubDomains"

# No build step / no filename hashing, so JS + CSS must revalidate every load
# (cheap 304s via ETag). Otherwise updated code never reaches browsers that
# already cached it — and no manual ?v= cache-busting is needed.
[[headers]]
  for = "/css/*"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/js/*"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/data/*"
  [headers.values]
    Cache-Control = "public, max-age=3600"

# Block search engines from caching admin pages
[[headers]]
  for = "/admin/*"
  [headers.values]
    X-Robots-Tag = "noindex, nofollow"

# Clean /admin URL → admin index
[[redirects]]
  from = "/admin"
  to = "/admin/index.html"
  status = 200

# Clean /admin/production URL → production tool
[[redirects]]
  from = "/admin/production"
  to = "/admin/production.html"
  status = 200

# Clean /admin/fridge-temperatures URL → fridge temperature log
[[redirects]]
  from = "/admin/fridge-temperatures"
  to = "/admin/fridge-temperatures.html"
  status = 200

# Clean /admin/opening-closing-checks URL → opening & closing checks
[[redirects]]
  from = "/admin/opening-closing-checks"
  to = "/admin/opening-closing-checks.html"
  status = 200
