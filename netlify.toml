[build]
  publish   = "."
  functions = "netlify/functions"

  [[plugins]]
    package = "@netlify/plugin-functions-install-core"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=(self)"
    # Force HTTPS for a year (Netlify serves the site over HTTPS).
    Strict-Transport-Security = "max-age=31536000; includeSubDomains"
    # Content-Security-Policy: restrict where scripts/styles/data can load from.
    # Allow-listed: Stripe (payments), Supabase (data/auth), Google Fonts,
    # Google Maps (the contact map iframe), esm.sh (Supabase JS module).
    # 'unsafe-inline' on script is required because the Supabase/Stripe config
    # is injected inline at deploy time; connect-src still tightly limits where
    # data can be sent, which is the main anti-exfiltration protection.
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' https://js.stripe.com https://m.stripe.network https://esm.sh; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self' https://*.supabase.co wss://*.supabase.co https://api.stripe.com https://m.stripe.network https://esm.sh; frame-src https://js.stripe.com https://hooks.stripe.com https://www.google.com; frame-ancestors 'self'; base-uri 'self'; form-action 'self'; object-src 'none'; upgrade-insecure-requests"

# No build step / no filename hashing, so JS + CSS must revalidate every load
# (cheap 304s via ETag). Otherwise updated code never reaches browsers that
# already cached it — and no manual ?v= cache-busting is needed.
[[headers]]
  for = "/css/*"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/js/*"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/data/*"
  [headers.values]
    Cache-Control = "public, max-age=3600"

# Block search engines from caching admin pages
[[headers]]
  for = "/admin/*"
  [headers.values]
    X-Robots-Tag = "noindex, nofollow"

# Subscriptions are temporarily disabled — send any visitor (bookmarks,
# search results, old links) to the weekly menu instead. 302 (not 301) and
# force = true so it overrides the still-present file and isn't permanently
# cached, making it easy to re-enable later by removing this block.
[[redirects]]
  from = "/subscriptions"
  to = "/menu.html"
  status = 302
  force = true

[[redirects]]
  from = "/subscriptions.html"
  to = "/menu.html"
  status = 302
  force = true

# Clean /admin URL → admin index
[[redirects]]
  from = "/admin"
  to = "/admin/index.html"
  status = 200

# Clean /admin/production URL → production tool
[[redirects]]
  from = "/admin/production"
  to = "/admin/production.html"
  status = 200

# Clean /admin/fridge-temperatures URL → fridge temperature log
[[redirects]]
  from = "/admin/fridge-temperatures"
  to = "/admin/fridge-temperatures.html"
  status = 200

# Clean /admin/opening-closing-checks URL → opening & closing checks
[[redirects]]
  from = "/admin/opening-closing-checks"
  to = "/admin/opening-closing-checks.html"
  status = 200
